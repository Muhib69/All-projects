<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        /* reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: dodgerblue;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background-color: #aaf;
            color: black;
            /* border: 2px solid black; */
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            padding: 12px;
            margin: 12px;

            border: 5px solid greenyellow;
            outline: 5px solid rgb(247, 0, 255);
            outline-offset: 12px;
        }
    </style>
</head>

<body>
    <div class="box">
        Box
    </div>
</body>

</html>
