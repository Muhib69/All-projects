<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> layout</title>
    <style>
        table{
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <table width="100%" height="1000px" border="1" bordercolor="black" cellspacing="0" cellpadding="0" text-align="center">
        <tr class="header" style="background-color: lightblue;">
            <td colspan="2"> header </td>
        </tr>
        <tr>
            <td class="sidebar" style="background-color: blue;" rowspan="2" height="100" width="30%">sidebar</td>
            <td class="main" style="background-color: dodgerblue;" rowspan="2" height="100" width="70%">main</td>
        </tr>
        <tr>
        </tr>
         <tr class="footer" style="background-color: lightgray;">
            <td colspan="2"> footer </td>
        </tr>
    </table>
</body>
</html>
