<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Example</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
        }

        header{
            background-color: darkblue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container{
            display: flex;
            min-height: 400px;
        }

        aside{
            width: 25%;
            background-color: lightgray;
            padding: 20px;
        }

        main{
            width: 75%;
            background-color: whitesmoke;
            padding: 20px;
        }

        footer{
            background-color: black;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Website Header</h1>
    </header>

    <div class="container">

        <aside>
            <h2>Sidebar</h2>
            <p>This is aside section.</p>
        </aside>

        <main>
            <h2>Main Content</h2>
            <p>This is main section of website.</p>
        </main>

    </div>

    <footer>
        <p>Website Footer</p>
    </footer>

</body>
</html>
