<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f8;
            color: #333;
        }

        .profile-card {
            max-width: 520px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            padding: 28px;
        }

        .profile-card h1 {
            margin: 0 0 18px;
            font-size: 28px;
            text-align: center;
            color: #ffffff;
            background-color: #b08888;
            padding: 16px 12px;
            border-radius: 14px;
        }

        .images {
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .images img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 18px;
            border: 2px solid #d6c3c3;
            background: #f9f7f7;
            padding: 4px;
        }

        .info p {
            margin: 10px 0;
            font-size: 16px;
            line-height: 1.5;
        }

        .info strong {
            color: #5f5f5f;
        }
    </style>
</head>

<body>
    <div class="profile-card">
        <h1>Membership Card</h1>
        <div class="images">
            <img src="images/muhib.JPG" alt="My image">
            <img src="images/QER.jpeg" alt="QR code">
        </div>
        <div class="info">
            <p><strong>Name:</strong> Muhib Ullah</p>
            <p><strong>Email:</strong> muhib6980@gmail</p>
            <p><strong>LinkedIn:</strong> Muhib Ullah</p>
            <p><strong>Company Name:</strong> Code Acadamy Nowshera</p>
            <p><strong>Address:</strong> Rehman Road, Grammar School, Nowshera Cantt</p>
        </div>
    </div>
</body>

</html>
