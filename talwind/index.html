<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="output.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav>
        <div class="navbar-container flex justify-between items-center p-4 bg-gray-800 text-white">
            <div class="logo text-3xl font-bold"><span class="text-amber-800">Code</span><span class="text-amber-600"> Acadmey</span></div>
            <ul class="nav-links flex justify-between gap-5">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="h-screen flex justify-center items-center bg-gray-400">
        <div class="w-full max-w-md p-8 rounded-lg shadow-lg bg-gray-800 text-white">
            <h1 class="text-4xl font-bold text-center mb-2">Login</h1>
            <p class="text-center mb-8">Welcome back! Please login to your account</p>
            
            <form class="space-y-6">
                <!-- Email Field -->
                <div>
                    <label class="block text-sm font-medium mb-2">Email Address</label>
                    <input type="email" placeholder="Enter your email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2">
                </div>

                <!-- Password Field -->
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" placeholder="Enter your password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2">
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex justify-between items-center text-sm">
                    <label class="flex items-center gap-2">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#forgot">Forgot password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="w-full py-2 font-bold rounded-lg transition">Login</button>
            </form>

            <!-- Sign Up Link -->
            <p class="text-center mt-6 text-sm">Don't have an account? <a href="#signup" class="font-bold">Sign up</a></p>
        </div>
    </section>
</body>
</html>
